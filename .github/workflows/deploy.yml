name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "deploy@github.com"
          git config --global user.name "GitHub Actions"
          
          # Force create the mandatory configuration header Hugging Face requires
          echo -e "---\ntitle: Main App Suite\nemoji: 🚀\ncolorFrom: indigo\ncolorTo: purple\nsdk: docker\napp_port: 7860\npinned: false\n---" > README.md
          
          git add README.md
          git commit -m "Inject mandatory Hugging Face metadata config block" --allow-empty
          
          # CRITICAL FIX: Push directly using the inline token so bash expands it perfectly
          git push --force https://ceciliaai:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/ceciliaai/main main
