name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Hugging Face Hub Library
        run: pip install huggingface_hub

      - name: Force Upload via Python API
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c '
          import os
          from huggingface_hub import HfApi
          
          # Force generate the required header file locally
          with open("README.md", "w") as f:
              f.write("---\ntitle: Main App Suite\nemoji: 🚀\ncolorFrom: indigo\ncolorTo: purple\nsdk: docker\napp_port: 7860\npinned: false\n---")
          
          # Initialize the official secure API transfer pipeline
          api = HfApi(token=os.environ["HF_TOKEN"])
          
          print("🚀 Syncing files directly to Hugging Face Space repository...")
          api.upload_folder(
              folder_path=".",
              repo_id="ceciliaai/main",
              repo_type="space"
          )
          print("🎉 Sync Complete!")
          '
